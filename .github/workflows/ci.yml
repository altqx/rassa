name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test, lint, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install native dependencies
        timeout-minutes: 15
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a \
            apt-get install -y --no-install-recommends \
            build-essential \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test -q

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build shared libraries
        run: cargo build --release -p rassa -p rassa-libass-capi -p rassa-check

      - name: Run Linux C ABI E2E smoke test
        run: scripts/e2e-linux-capi.sh

      - name: Verify shared-library outputs
        run: |
          test -f target/release/librassa.so
          test -f target/release/libass.so
          file target/release/librassa.so target/release/libass.so
          nm -D --defined-only target/release/librassa.so \
            | grep -E ' ass_library_init$| ass_library_version$| ass_render_frame$'
          nm -D --defined-only target/release/libass.so \
            | grep -E ' ass_library_init$| ass_library_version$| ass_render_frame$'

      - name: Check package file lists
        run: |
          set -euo pipefail
          crates=(
            rassa-core
            rassa-fonts
            rassa-parse
            rassa-unibreak
            rassa-unicode
            rassa-shape
            rassa-raster
            rassa-layout
            rassa-render
            rassa-capi
            rassa
            rassa-libass-capi
            rassa-check
          )
          for crate in "${crates[@]}"; do
            cargo package -p "$crate" --list >/dev/null
          done


  cross-platform-e2e:
    name: cross-platform compile and artifact checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install native dependencies
        timeout-minutes: 15
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a \
            apt-get install -y --no-install-recommends \
            build-essential \
            gcc-mingw-w64-x86-64-posix \
            wabt \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config

      - name: Install Rust toolchain and targets
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable
          rustup target add \
            x86_64-unknown-linux-gnu \
            x86_64-apple-darwin \
            aarch64-apple-darwin \
            x86_64-pc-windows-gnu \
            wasm32-unknown-unknown

      - name: Cross-target check macOS and web backends
        run: |
          set -euo pipefail
          for target in \
            x86_64-apple-darwin \
            aarch64-apple-darwin \
            wasm32-unknown-unknown; do
            cargo check -p rassa --target "$target" --quiet
          done

      - name: Build Linux, Windows DLL, and Web artifacts
        run: |
          set -euo pipefail
          cargo build --release -p rassa -p rassa-libass-capi --target x86_64-unknown-linux-gnu
          cargo build --release -p rassa -p rassa-libass-capi --target x86_64-pc-windows-gnu
          cargo build --release -p rassa -p rassa-libass-capi --target wasm32-unknown-unknown

      - name: Verify cross-platform artifacts
        run: |
          set -euo pipefail
          file \
            target/x86_64-unknown-linux-gnu/release/librassa.so \
            target/x86_64-unknown-linux-gnu/release/libass.so \
            target/x86_64-pc-windows-gnu/release/rassa.dll \
            target/x86_64-pc-windows-gnu/release/ass.dll \
            target/wasm32-unknown-unknown/release/rassa.wasm \
            target/wasm32-unknown-unknown/release/ass.wasm
          x86_64-w64-mingw32-nm -g target/x86_64-pc-windows-gnu/release/ass.dll \
            | grep -E 'ass_library_init|ass_library_version|ass_render_frame'
          wasm-objdump -x target/wasm32-unknown-unknown/release/ass.wasm \
            | grep -E 'ass_library_init|ass_library_version|ass_render_frame'

  native-runtime-visual:
    name: ${{ matrix.os }} runtime visual smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Run native raster tests
        shell: bash
        run: cargo test -p rassa-raster --lib --quiet

      - name: Build native shared libraries and checker
        shell: bash
        run: cargo build --release -p rassa -p rassa-libass-capi -p rassa-check

      - name: Render PNG visual smoke frame
        shell: bash
        env:
          RASSA_CROSSFONT_WINDOWS_SUBPIXEL: auto
        run: |
          set -euo pipefail
          mkdir -p target/runtime-visual
          cat > target/runtime-visual/smoke.ass <<'ASS'
          [Script Info]
          PlayResX: 320
          PlayResY: 180

          [V4+ Styles]
          Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding
          Style: Default,Arial,32,&H0000FF00,&H0000FFFF,&H00000000,&H00000000,0,0,0,0,100,100,0,0,1,2,1,5,10,10,10,1

          [Events]
          Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text
          Dialogue: 0,0:00:00.00,0:00:05.00,Default,,0000,0000,0000,,{\p1\pos(100,80)}m 0 0 l 120 0 l 120 40 l 0 40
          ASS
          cargo run --release -p rassa-check -- \
            --input target/runtime-visual/smoke.ass \
            --output target/runtime-visual/frame.png \
            --format png \
            --time-ms 500 \
            --width 320 \
            --height 180
          cat > target/runtime-visual/text-smoke.ass <<'ASS'
          [Script Info]
          PlayResX: 320
          PlayResY: 180

          [V4+ Styles]
          Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding
          Style: Default,Arial,32,&H0000FF00,&H0000FFFF,&H00000000,&H00000000,0,0,0,0,100,100,0,0,1,2,1,5,10,10,10,1

          [Events]
          Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text
          Dialogue: 0,0:00:00.00,0:00:05.00,Default,,0000,0000,0000,,Rassa native smoke
          ASS
          cargo run --release -p rassa-check -- \
            --input target/runtime-visual/text-smoke.ass \
            --output target/runtime-visual/text-frame.png \
            --format png \
            --time-ms 500 \
            --width 320 \
            --height 180
          cat > target/runtime-visual/validate_png.py <<'PY'
          from pathlib import Path
          for name in ('frame.png', 'text-frame.png'):
              path = Path('target/runtime-visual') / name
              data = path.read_bytes()
              assert data.startswith(b'\x89PNG\r\n\x1a\n'), f'{name} is not a PNG'
              assert len(data) > 512, f'{name} is unexpectedly small: {len(data)} bytes'
              print(f'native visual PNG ok: {path} ({len(data)} bytes)')
          PY
          if command -v python3 >/dev/null 2>&1; then
            python3 target/runtime-visual/validate_png.py
          else
            python target/runtime-visual/validate_png.py
          fi
